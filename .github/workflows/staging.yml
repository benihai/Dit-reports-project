name: Deploy Staging to Netlify

on:
  push:
    branches: [ staging ]
  workflow_dispatch:

jobs:
  # ── Job 1: Netlify deploy + auto-merge staging → main ──────────────────────
  # NO `environment:` here on purpose. The github-pages environment is branch
  # protected (main only); putting it on this job made GitHub reject the WHOLE
  # job at the gate when triggered from `staging` (4s, no runner, no steps) —
  # which silently blocked BOTH the Netlify deploy and the auto-merge to main.

  pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
