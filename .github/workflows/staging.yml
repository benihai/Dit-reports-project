name: Deploy Staging to Netlify

on:
  push:
    branches: [ staging ]
  workflow_dispatch:

jobs:
  # ── Job 1: Netlify deploy + auto-merge staging → main ──────────────────────
  # NO `environment:` here on purpose. The github-pages environment is branch
  # protected (main only); putting it on this job made GitHub reject the WHOLE
  # job at the gate when triggered from `staging` (4s, no runner, no steps) —
  # which silently blocked BOTH the Netlify deploy and the auto-merge to main.
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Install the render-pdf function's deps (@sparticuz/chromium etc.) so
      # Netlify can bundle them. The action deploys via API and does not run an
      # npm install itself, so node_modules must exist before the deploy step.
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install function deps
        continue-on-error: true
        run: npm install --no-audit --no-fund

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2
        continue-on-error: true
        with:
          publish-dir: '.'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from staging branch - ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: 7c8b79f8-f272-438e-b964-35033fa17bc7

      - name: Merge staging into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --ff-only origin/staging || git merge -X theirs origin/staging
          git push origin main

  # ── Job 2: GitHub Pages deploy (best-effort) ───────────────────────────────
  # Isolated so the github-pages environment gate can only fail THIS job, never
  # the Netlify deploy / auto-merge above. If the environment's "deployment
  # branches" policy permits `staging`, Pages deploys here; otherwise this job
  # fails alone and Pages is published from `main` via pages.yml instead.
  pages:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
