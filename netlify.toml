[build]
  publish = "."
  command = ""
  [build.environment]
    NODE_VERSION = "20"

# PDF renderer (netlify/functions/render-pdf.js) needs the headless Chromium
# binary shipped alongside it. Keep @sparticuz/chromium external (don't let
# esbuild inline it) and include its files in the function bundle.
[functions]
  node_bundler = "esbuild"

[functions."render-pdf"]
  external_node_modules = ["@sparticuz/chromium"]
  included_files = ["node_modules/@sparticuz/chromium/**"]

# Service worker must never be cached — always fetch fresh
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# HTML files — no cache so navigation always gets fresh shell
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Static assets with version strings — long cache is safe
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
