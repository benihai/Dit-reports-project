  <!-- Global JS error surface — non-destructive banner, never wipes a working screen -->
  <script>
    // Persist a small ring buffer of errors (incl. opaque ones) with the route
    // they happened on, so an intermittent crash is traceable via #/diag.
    function __ditLogErr(o) {
      try {
        var k = 'dc:errlog';
        var arr = JSON.parse(localStorage.getItem(k) || '[]');
        arr.push(Object.assign({
          t: new Date().toISOString(),
          hash: location.hash || '#/',
          online: navigator.onLine
        }, o));
        while (arr.length > 30) arr.shift();
        localStorage.setItem(k, JSON.stringify(arr));
      } catch (_) {}
    }
    window.onerror = function(msg, src, line, col, err) {
      __ditLogErr({ kind: 'error', msg: String(msg), src: src || '', line: line || 0 });
      // Opaque cross-origin "Script error." (no source/line, no Error object)
      // carries no actionable detail — it comes from a third-party CDN script
      // loaded without crossorigin. Log it but DO NOT blank the screen.
      if ((msg === 'Script error.' || !src) && !err) {
        console.warn('Ignored opaque cross-origin error:', msg, src, line, 'route=', location.hash);
        return false;
      }
      // Real error: show a dismissible banner instead of replacing the view,
      // so the user's current screen and state are preserved.
      try {
        console.error('Global error:', msg, src + ':' + line, err);
        var box = document.getElementById('global-error-banner');
        if (!box) {
          box = document.createElement('div');
          box.id = 'global-error-banner';
          box.style.cssText = 'position:fixed;left:8px;right:8px;bottom:8px;z-index:99999;' +
            'background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:10px 38px 10px 14px;' +
            'color:#991b1b;font-family:sans-serif;font-size:13px;direction:rtl;text-align:right;' +
            'box-shadow:0 4px 14px rgba(0,0,0,.18);max-width:560px;margin:0 auto;';
          document.body.appendChild(box);
        }
        box.innerHTML = '<button onclick="this.parentNode.remove()" style="position:absolute;' +
          'inset-inline-start:8px;top:8px;background:none;border:none;color:#991b1b;font-size:16px;' +
          'cursor:pointer;line-height:1;">✕</button>' +
          '<b>שגיאה זמנית:</b> ' + String(msg) +
          ' <small style="opacity:.65;">(' + (src || '') + ':' + (line || 0) + ')</small>';
      } catch (_) {}
      return false;
    };
    // Surface unhandled promise rejections to the console (do not blank the UI).
    window.addEventListener('unhandledrejection', function(e) {
      var r = e && e.reason;
      __ditLogErr({ kind: 'rejection', msg: String((r && (r.message || r)) || 'unknown') });
      console.error('Unhandled promise rejection:', r, 'route=', location.hash);
    });
  </script>
</head>
<body>

  <!-- HEADER -->
  <header class="header" id="app-header">
    <button class="btn-icon hidden" id="btn-back" onclick="App.goBack()" aria-label="חזרה">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>

    <img src="icons/dit-logo.png" alt="DIT Report" class="header-logo" id="header-logo" onclick="Router.navigate('/')" role="button" aria-label="דף הבית">
    <span id="header-title"></span>

    <div id="header-actions"></div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="view-container">
    <div style="padding:40px;text-align:center;color:#888;">טוען...</div>
  </main>

  <!-- MARKUP FULLSCREEN (hidden by default) -->
  <div id="markup-screen" class="hidden"></div>

  <!-- CONFIRM OVERLAY -->
  <div id="confirm-overlay" class="modal-overlay hidden" style="align-items:center;">
    <div class="modal-box confirm-box" onclick="event.stopPropagation()" style="max-width:320px;width:calc(100% - 32px);text-align:center;border-radius:var(--radius);padding:24px 20px 20px;">
      <p id="confirm-message"></p>
      <div class="confirm-actions">
        <button class="btn btn-danger btn-sm" id="confirm-yes">מחק</button>
        <button class="btn btn-outline btn-sm" id="confirm-no">ביטול</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- HIDDEN PDF RENDER AREA -->
  <div id="pdf-template" style="position:fixed;left:-9999px;top:0;width:794px;background:white;"></div>

  <!-- SUPABASE — local copy, no CDN dependency -->

       works even on the very first load with no network -->

  <script src="js/supabase-client.js?v=5.57"></script>
  <script src="js/auth.js?v=5.57"></script>

  <script src="js/netStatus.js?v=5.57"></script>

  <script src="js/pdfMarkup.js?v=5.57"></script>
  <script src="js/pdfExport.js?v=5.57"></script>
  <script src="js/views/login.js?v=5.57"></script>
  <script src="js/views/viewerReports.js?v=5.57"></script>
  <script src="js/views/admin.js?v=5.57"></script>
  <script src="js/views/userHome.js?v=5.57"></script>
